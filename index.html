<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--sb:#0f172a;--card:#fff;--bdr:#e2e8f0;--txt:#1e293b;--mut:#64748b;--amb:#f59e0b;--red:#ef4444;--pur:#8b5cf6;--org:#f97316;--grn:#22c55e;--blu:#3b82f6;--tel:#14b8a6}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.app{display:flex;min-height:100vh}
.sb{width:224px;background:var(--sb);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:50;overflow-y:auto}
.slogo{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sico{width:34px;height:34px;background:var(--blu);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.sbrand{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.ssub{font-size:10px;color:#64748b;margin-top:1px}
nav{padding:10px 8px;flex:1}
.nsec{font-size:9.5px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:12.5px;font-weight:500;transition:.15s;width:100%;background:none;border:none;text-align:left}
.ni:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.ni.on{background:rgba(59,130,246,.2);color:#93c5fd}
.nico{font-size:15px;width:20px;text-align:center}
.sftr{padding:10px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:6px}
.sbtn{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;background:rgba(34,197,94,.12);color:#4ade80;border-radius:7px;font-size:11px;font-weight:600;text-decoration:none}
.sbtn:hover{background:rgba(34,197,94,.2)}
.main{flex:1;margin-left:224px;min-height:100vh}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 56px;position:sticky;top:0;z-index:40}
.tbtitle{font-size:14px;font-weight:700}
.av{width:30px;height:30px;border-radius:50%;background:var(--blu);color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center}
.pg{padding:20px}
/* KPI */
.kg{display:grid;gap:10px;margin-bottom:16px}
.k6{grid-template-columns:repeat(6,1fr)}
.k4{grid-template-columns:repeat(4,1fr)}
.k3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kl{font-size:10.5px;color:var(--mut);font-weight:500;margin-bottom:6px}
.kv{font-size:20px;font-weight:800;line-height:1}
.ks{font-size:10px;color:var(--mut);margin-top:4px}
/* Tables */
.tc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.tt{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ttl{font-size:13px;font-weight:700}
.inp{padding:6px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--blu)}
.sel{padding:6px 10px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--card)}
table{width:100%;border-collapse:collapse}
thead{background:#f8fafc}
th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--txt)}
.r{text-align:right}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
tfoot td{background:#f0f9ff;font-weight:700;border-top:2px solid #bfdbfe}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
/* Buttons */
.btn{padding:5px 13px;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.bp{background:var(--blu);color:#fff}.bp:hover{opacity:.9}
.bb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}.bb:hover{background:#dbeafe}
.bg2{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.ba{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.br{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.bw{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.bg3{background:var(--card);border:1px solid var(--bdr);color:var(--mut)}
.bsm{padding:3px 9px;font-size:11px}
/* Expand */
.exb{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.exb.op{background:var(--blu);color:#fff}.exb.cl{background:#eff6ff;color:var(--blu)}
.trx td{background:#eff6ff}
.drow td{padding:0;background:linear-gradient(180deg,#f0f9ff,#e8f4ff)}
.dw{padding:16px}

.ams{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:12px}
.amc{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;text-align:center}
.amc.hl{background:var(--blu);border-color:var(--blu)}
.amc .l{font-size:9.5px;color:var(--mut);margin-bottom:3px}
.amc.hl .l{color:rgba(255,255,255,.75)}
.amc .v{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.amc.hl .v{color:#fff}

.bsec{background:#fff;border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:12px}
.bsh{padding:9px 14px;background:#f1f5f9;border-bottom:1px solid var(--bdr);font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between}

.mbk{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--card);border-radius:14px;padding:22px;width:520px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.22);max-height:90vh;overflow-y:auto}
.mlg{width:680px}
.mxl{width:860px}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:11px}
.fl{font-size:11.5px;font-weight:600;color:var(--mut);margin-bottom:4px;display:block}
.fi{width:100%;padding:7px 11px;border:1px solid var(--bdr);border-radius:7px;font-size:12.5px;font-family:inherit;outline:none}
.fi:focus{border-color:var(--blu)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mft{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.prev{background:#f8fafc;border:1px solid var(--bdr);border-radius:8px;padding:14px;font-size:12px;line-height:1.75;white-space:pre-wrap;max-height:240px;overflow-y:auto;font-family:inherit}
/* Dash */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.dc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:15px}
.dct{font-size:13px;font-weight:700;margin-bottom:10px}
.pmr,.topr{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:8px;cursor:pointer;transition:.15s}
.pmr:hover,.topr:hover{background:#f8fafc}
.pmav{width:30px;height:30px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.rnk{width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.r1{background:#fef2f2;color:#b91c1c}.r2{background:#fff7ed;color:#c2410c}.r3{background:#fefce8;color:#854d0e}.rn{background:#f1f5f9;color:#475569}
.bkb{height:5px;border-radius:3px;background:#e2e8f0;margin-top:5px;overflow:hidden}
/* Tabs */
.ptabs{display:flex;gap:3px;background:var(--bdr);padding:3px;border-radius:9px;width:fit-content}
.ptab{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mut);font-family:inherit;transition:.15s}
.ptab.on{background:var(--card);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.a90{background:rgba(245,158,11,.13);color:#92400e}
.a60{background:rgba(139,92,246,.13);color:#6d28d9}
.a30{background:rgba(34,197,94,.13);color:#15803d}
.sb{transition:width .2s ease,transform .2s ease}
.sb.closed{width:0;overflow:hidden}
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;display:none}
.sb-overlay.show{display:block}
.toggle-btn{position:fixed;top:11px;left:11px;z-index:51;width:30px;height:30px;border-radius:8px;background:var(--blu);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s}
.toggle-btn:hover{background:#2563eb}
.main{transition:margin-left .2s ease}

function daysDiff(ds){
  if(!ds)return null;
  const p=String(ds).replace('Extended to','').replace('extend','').trim().split(/[\.\-\/]/);
  if(p.length<3)return null;
  try{
    let d,m,y;
    if(String(p[0]).length===4){y=+p[0];m=+p[1];d=+p[2];}else{d=+p[0];m=+p[1];y=+p[2];}
    return Math.round((new Date(y,m-1,d)-new Date())/86400000);
  }catch(e){return null;}
}
function expStyle(ds){
  const d=daysDiff(ds);
  if(d===null)return'';
  if(d<0)return'color:#b91c1c;font-weight:700';
  if(d<30)return'color:#f59e0b;font-weight:700';
  return'';
}
function buildMsg(s,type){
  const ag=AG.filter(r=>r.sno===s.sno);
  const mx=ag.length?Math.max(...ag.map(r=>r.days)):0;
  const lines=[];
  if(s.pending>0)lines.push('  Pending Bills     : '+f2(s.pending));
  if(s.sd>0)lines.push('  SD Deduction      : '+f2(s.sd));
  if(s.ld>0)lines.push('  LD Deduction      : '+f2(s.ld));
  if(s.witheld>0)lines.push('  Withheld Amount   : '+f2(s.witheld));
  if(type==='wa'){
    return '*Payment Follow-Up - Vishal Electricals*\n\nDear Sir/Madam,\n\nOutstanding dues for:\n*'+s.name+'*\n\n'+lines.map(l=>l.trim()).join('\n')+'\n\n*Total Outstanding: '+f2(s.total)+'*\nOldest Invoice: *'+mx+' days old*\n\nKindly process or advise expected payment date.\n\nThank you\n- Vishal Electricals Finance';

}

    h+='</tr>';

  h+='</tbody><tfoot><tr><td colspan="5">Total ('+rows.length+')</td><td class="r mono" style="color:#3b82f6">'+f2(total)+'</td><td colspan="7"></td></tr></tfoot></table></div>';
  return h;
}

// ── ACTIONS ───────────────────────────────────────────────────
window.openFU=(id,type)=>{modal={type,sid:id};render();};
window.edSite=(id)=>{
  const s=st.sites.find(x=>x.id===id);if(!s)return;
  const p=prompt('Pending Bill:',s.pending);if(p!==null)s.pending=parseFloat(p)||0;
  const sd=prompt('SD Deduction:',s.sd);if(sd!==null)s.sd=parseFloat(sd)||0;
  const ld=prompt('LD Deduction:',s.ld);if(ld!==null)s.ld=parseFloat(ld)||0;
  const w=prompt('Withheld:',s.witheld);if(w!==null)s.witheld=parseFloat(w)||0;
  const t=prompt('Total Outstanding:',s.total);if(t!==null)s.total=parseFloat(t)||0;
  save();render();
};
window.addInv=(sid)=>{
  const s=st.sites.find(x=>x.id===sid);if(!s)return;
  const no=prompt('Invoice Number:');if(!no)return;
  const date=prompt('Date:');const amount=parseFloat(prompt('Amount:')||'0')||0;
  const desc=prompt('Description:');const status=prompt('Status (Pending/Paid/Partial):','Pending');
  s.invoices.push({id:uid(),no,date:date||'',amount,desc:desc||'',status:status||'Pending'});
  save();render();
};
window.edInv=(sid,iid)=>{
  const s=st.sites.find(x=>x.id===sid);const inv=s&&s.invoices.find(i=>i.id===iid);if(!inv)return;
  const no=prompt('Invoice No:',inv.no);if(no!==null)inv.no=no;
  const date=prompt('Date:',inv.date);if(date!==null)inv.date=date;
  const amt=prompt('Amount:',inv.amount);if(amt!==null)inv.amount=parseFloat(amt)||0;
  const desc=prompt('Description:',inv.desc);if(desc!==null)inv.desc=desc;
  const st2=prompt('Status:',inv.status);if(st2!==null)inv.status=st2;
  save();render();
};
window.delInv=(sid,iid)=>{if(!confirm('Delete invoice?'))return;const s=st.sites.find(x=>x.id===sid);if(s){s.invoices=s.invoices.filter(i=>i.id!==iid);save();render();}};
window.openBillM=(sid,bid)=>{modal={type:'bill',sid,bid};render();};
window.saveBill=(sid,bid)=>{
  const s=st.sites.find(x=>x.id===sid);if(!s)return;
  const gv=(id,n)=>{const el=document.getElementById(id);return n?parseFloat(el?el.value:'0')||0:el?el.value:'';};
  const b={id:bid||uid(),invNo:gv('bi_no'),invDate:gv('bi_dt'),taxable:gv('bi_tax',true),gst:gv('bi_gst',true),total:gv('bi_tax',true)+gv('bi_gst',true),payDate:gv('bi_pdt'),payAmt:gv('bi_pay',true),gstTDS:gv('bi_gtds',true),incomeTDS:gv('bi_itds',true),labCess:0,ld:gv('bi_ld',true),sdDeduct:gv('bi_sd',true),autoDDRecovery:gv('bi_auto',true),shortPay:gv('bi_sp',true)};
  if(bid){const i=s.bills.findIndex(x=>x.id===bid);if(i>=0)s.bills[i]=b;}else s.bills.push(b);
  modal=null;save();render();
};
window.delBill=(sid,bid)=>{if(!confirm('Delete bill?'))return;const s=st.sites.find(x=>x.id===sid);if(s){s.bills=s.bills.filter(x=>x.id!==bid);save();render();}};
window.openDepM=(rid)=>{modal={type:'dep',rid:rid||null};render();};
window.saveDep=(rid)=>{
  const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const d={id:rid||uid(),sno:rid?st.deposits.find(x=>x.id===rid)&&st.deposits.find(x=>x.id===rid).sno:st.deposits.length+1,dated:gv('d_dt'),nature:gv('d_nat'),authority:gv('d_auth'),work:gv('d_work'),amt:parseFloat(gv('d_amt'))||0,bank:gv('d_bank'),instrument:gv('d_inst'),period:gv('d_per'),status:gv('d_st'),due:gv('d_due')};
  if(rid){const i=st.deposits.findIndex(x=>x.id===rid);if(i>=0)st.deposits[i]=d;}else st.deposits.push(d);
  modal=null;save();render();
};
window.delDep=(rid)=>{if(!confirm('Delete deposit?'))return;st.deposits=st.deposits.filter(x=>x.id!==rid);save();render();};
window.openBGM=(rid)=>{modal={type:'bg',rid:rid||null};render();};
window.saveBG=(rid)=>{
  const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const d={id:rid||uid(),sno:rid?st.bgReports.find(x=>x.id===rid)&&st.bgReports.find(x=>x.id===rid).sno:st.bgReports.length+1,section:gv('b_sec'),authority:gv('b_auth'),work:gv('b_work'),bgNo:gv('b_no'),bgPct:gv('b_pct'),issueDate:gv('b_iss'),expiryDate:gv('b_exp'),claimPeriod:gv('b_clm'),dlp:gv('b_dlp'),amt:parseFloat(gv('b_amt'))||0,status:gv('b_st')};
  if(rid){const i=st.bgReports.findIndex(x=>x.id===rid);if(i>=0)st.bgReports[i]=d;}else st.bgReports.push(d);
  modal=null;save();render();
};
window.delBG=(rid)=>{if(!confirm('Delete BG?'))return;st.bgReports=st.bgReports.filter(x=>x.id!==rid);save();render();};

const dl=(c,fn,t)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=fn;a.click();};
window.expPayCSV=()=>{const h='S.No,Project,PM,Pending,SD,LD,Withheld,Total';const r=st.sites.map(s=>[s.sno,'"'+s.name+'"',s.pm,s.pending,s.sd,s.ld,s.witheld,s.total].join(','));dl([h,...r].join('\n'),'ve_payment.csv','text/csv');};
window.expDepCSV=()=>{const h='S.No,Date,Authority,Nature,Amount,Instrument,Bank,Period,Status,Due';const r=st.deposits.map(d=>[d.sno,d.dated,'"'+d.authority+'"',d.nature,d.amt,'"'+d.instrument+'"',d.bank,d.period,d.status,d.due].join(','));dl([h,...r].join('\n'),'ve_deposits.csv','text/csv');};
window.expBGCSV=()=>{const h='S.No,Section,Authority,BG No,BG%,Issue Date,Expiry Date,Claim Period,DLP,Amount,Status';const r=st.bgReports.map(b=>[b.sno,b.section,'"'+b.authority+'"',b.bgNo,b.bgPct,b.issueDate,'"'+b.expiryDate+'"',b.claimPeriod,b.dlp,b.amt,b.status].join(','));dl([h,...r].join('\n'),'ve_bg.csv','text/csv');};
window.expJSON=()=>dl(JSON.stringify(st,null,2),'ve_backup.json','application/json');
window.impJSON=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{st=JSON.parse(ev.target.result);save();render();alert('Imported!');}catch(e){alert('Invalid JSON');}};r.readAsText(e.target.files[0]);};i.click();};
window.resetAll=()=>{if(!confirm('Reset ALL data?'))return;st={sites:JSON.parse(JSON.stringify(DS)),deposits:REAL_DEP,bgReports:REAL_BG,pantryId:''};save();render();};

render();
</script>
