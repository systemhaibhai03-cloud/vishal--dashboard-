<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishal Electricals – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--sidebar:#0f172a;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;
  --amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--orange:#f97316;
  --green:#22c55e;--blue:#3b82f6;--teal:#14b8a6;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:50;overflow-y:auto}
.sidebar-logo{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo .icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}
.sidebar-logo .brand{font-size:14px;font-weight:800;color:#fff}
.sidebar-logo .sub{font-size:10px;color:#94a3b8;margin-top:2px}
nav{padding:12px 8px;flex:1}
.nav-section{font-size:9.5px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:12.5px;font-weight:500;transition:.15s;width:100%;background:none;border:none;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(59,130,246,.18);color:#93c5fd}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.06)}
.sheet-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:rgba(34,197,94,.12);color:#4ade80;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;transition:.15s}
.sheet-btn:hover{background:rgba(34,197,94,.2)}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:40}
.topbar-title{font-size:14px;font-weight:700}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center}
.content{padding:20px;flex:1}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kpi-label{font-size:10.5px;color:var(--muted);font-weight:500;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:800;line-height:1}

/* TABLE BASE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-title{font-size:13px;font-weight:700}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;min-width:180px}
.search-input:focus{border-color:var(--blue)}
.sel{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--card)}
table{width:100%;border-collapse:collapse}
thead{background:#f8fafc}
th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th.r,td.r{text-align:right}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
tfoot td{background:#f0f9ff;font-weight:700;font-size:12px;border-top:2px solid #bfdbfe}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-amber{background:#fffbeb;color:#92400e}
.badge-red{background:#fef2f2;color:#b91c1c}
.badge-purple{background:#f5f3ff;color:#7c3aed}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-teal{background:#f0fdfa;color:#0f766e}

/* AGING */
.age-180{background:rgba(239,68,68,.12);color:#b91c1c}
.age-90{background:rgba(245,158,11,.12);color:#92400e}
.age-60{background:rgba(139,92,246,.12);color:#6d28d9}
.age-30{background:rgba(34,197,94,.12);color:#15803d}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{opacity:.9}
.btn-green{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}.btn-green:hover{background:#dcfce7}
.btn-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}.btn-blue:hover{background:#dbeafe}
.btn-amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.btn-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.btn-wa{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--muted)}

/* EXPAND */
.expand-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.expand-btn.open{background:var(--blue);color:#fff}
.expand-btn.closed{background:#eff6ff;color:var(--blue)}
.tr-expanded td{background:#eff6ff}
.detail-row td{padding:0;background:linear-gradient(180deg,#f0f9ff,#e0f2fe)}
.detail-wrap{padding:16px}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:14px;padding:24px;width:520px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:inherit;outline:none}
.form-input:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.email-preview{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:inherit;max-height:220px;overflow-y:auto}

/* DASH */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.dash-card-title{font-size:13px;font-weight:700;margin-bottom:12px}
.pm-row,.top-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s}
.pm-row:hover,.top-row:hover{background:#f8fafc}
.pm-avatar{width:32px;height:32px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.rank-badge{width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.rank-1{background:#fef2f2;color:#b91c1c}.rank-2{background:#fff7ed;color:#c2410c}.rank-3{background:#fefce8;color:#854d0e}.rank-n{background:#f1f5f9;color:#475569}
.bucket-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:5px}

/* AMOUNT CARDS */
.amt-cards{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:14px}
.amt-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.amt-card.hl{background:var(--blue);border-color:var(--blue)}
.amt-card .lbl{font-size:9.5px;color:var(--muted);margin-bottom:3px}
.amt-card.hl .lbl{color:rgba(255,255,255,.7)}
.amt-card .val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.amt-card.hl .val{color:#fff}

/* SETTINGS */
.settings-wrap{max-width:620px;display:flex;flex-direction:column;gap:14px}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}

/* LOADING */
.loading{padding:40px;text-align:center;color:var(--muted);font-size:12px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:12px}
.count-badge{display:inline-block;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#2563eb;font-size:10.5px;font-weight:700;margin-left:6px}

/* TABS inside page */
.page-tabs{display:flex;gap:4px;background:var(--border);padding:4px;border-radius:10px;width:fit-content;margin-bottom:14px}
.page-tab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:.15s}
.page-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* INLINE EDIT */
.editable{cursor:pointer;border-bottom:1px dashed var(--muted);padding-bottom:1px}
.editable:hover{color:var(--blue);border-color:var(--blue)}
</style>
</head>

// ============================================================
function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  const parse=line=>{const r=[];let cur='',inQ=false;for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}r.push(cur.trim());return r;};
  if(!lines.length)return[];
  const headers=parse(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parse(l);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim()});
    return obj;
  });
}

async function loadCSV(){
  csvLoading=true;csvError='';render();
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const text=await r.text();
    const rows=parseCSV(text);
    // Try to detect which tab we're getting. The CSV URL doesn't specify a sheet.
    // We split into deposits and BG based on column presence
    processCSVRows(rows);
    csvLoading=false;csvError='';save();render();
  }catch(e){
    csvLoading=false;
    csvError='Could not fetch live data: '+e.message+'. Using locally stored data.';
    render();
  }
}

function processCSVRows(rows){
  if(!rows.length)return;
  const keys=Object.keys(rows[0]).map(k=>k.toLowerCase());
  // Detect deposit sheet by key presence
  const isDeposit=keys.some(k=>k.includes('deposit')||k.includes('dr no')||k.includes('dr date')||k.includes('receipt'));
  const isBG=keys.some(k=>k.includes('bg no')||k.includes('bank guarantee')||k.includes('bg amount')||k.includes('expiry'));
  if(isDeposit||(!isBG)){
    // Map generically
    st.deposits=rows.filter(r=>Object.values(r).some(v=>v)).map((r,i)=>({
      id:uid(),
      sno:r['S.No']||r['Sno']||r['sno']||(i+1),
      date:r['Date']||r['date']||r['DR Date']||'',
      project:r['Project']||r['project']||r['Project Name']||r['Site']||'',
      drNo:r['DR No']||r['dr no']||r['Receipt No']||r['Deposit Receipt No']||'',
      bank:r['Bank']||r['bank']||r['Bank Name']||'',
      amount:parseFloat((r['Amount']||r['amount']||r['Deposit Amount']||'0').replace(/[₹,]/g,''))||0,
      status:r['Status']||r['status']||'Active',
      remarks:r['Remarks']||r['remarks']||r['Narration']||'',
      ...r
    }));
  }
  if(isBG){
    st.bgReports=rows.filter(r=>Object.values(r).some(v=>v)).map((r,i)=>({
      id:uid(),
      sno:r['S.No']||r['Sno']||(i+1),
      project:r['Project']||r['Project Name']||r['Site']||'',
      bgNo:r['BG No']||r['BG Number']||r['Bank Guarantee No']||'',
      bank:r['Bank']||r['Issuing Bank']||'',
      bgType:r['Type']||r['BG Type']||'',
      amount:parseFloat((r['BG Amount']||r['Amount']||'0').replace(/[₹,]/g,''))||0,
      issueDate:r['Issue Date']||r['Date of Issue']||'',
      expiryDate:r['Expiry Date']||r['Date of Expiry']||'',
      status:r['Status']||'Active',
      remarks:r['Remarks']||'',
      ...r
    }));
  }
}

function renderDeposits(){
  if(csvLoading)return`<div class="loading"><div class="spinner"></div><br>Loading from Google Sheet...</div>`;
  let rows=[...st.deposits];
  // Search + filter
  if(depSearch)rows=rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(depSearch.toLowerCase()));

  if(depFilterStatus)rows=rows.filter(r=>(r.status||'Active')===depFilterStatus);

    let av=a[depSort.col]||'',bv=b[depSort.col]||'';

function renderBG(){
  if(csvLoading)return`<div class="loading"><div class="spinner"></div><br>Loading from Google Sheet...</div>`;
  let rows=[...st.bgReports];
  if(bgSearch)rows=rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(bgSearch.toLowerCase()));
  if(bgFilterProject)rows=rows.filter(r=>r.project===bgFilterProject);
  if(bgFilterStatus)rows=rows.filter(r=>(r.status||'Active')===bgFilterStatus);
  if(bgFilterType)rows=rows.filter(r=>r.bgType===bgFilterType);
  rows.sort((a,b)=>{
    let av=a[bgSort.col]||'',bv=b[bgSort.col]||'';
    if(typeof av==='number')return bgSort.dir*(av-bv);
    return bgSort.dir*av.toString().localeCompare(bv.toString());
  });
  const projects=[...new Set(st.bgReports.map(r=>r.project).filter(Boolean))].sort();
  const types=[...new Set(st.bgReports.map(r=>r.bgType).filter(Boolean))].sort();
  const totalAmt=rows.reduce((a,r)=>a+r.amount,0);
  const active=rows.filter(r=>!r.status||r.status==='Active').length;

  const thS=k=>`onclick="bgSort=bgSort.col==='${k}'?{col:'${k}',dir:-bgSort.dir}:{col:'${k}',dir:1};render()"`;

  return`
${csvError?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:12px;color:#b91c1c;margin-bottom:12px">⚠️ ${csvError}</div>`:''}
<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
  <div class="kpi" style="flex:1"><div class="kpi-label">Total BGs</div><div class="kpi-value" style="color:#6366f1">${st.bgReports.length}</div></div>
  <div class="kpi" style="flex:1"><div class="kpi-label">Active BGs</div><div class="kpi-value" style="color:#22c55e">${active}</div></div>
  <div class="kpi" style="flex:1"><div class="kpi-label">Total BG Amount</div><div class="kpi-value" style="color:#3b82f6">${fmtS(st.bgReports.reduce((a,r)=>a+r.amount,0))}</div></div>
  <div class="kpi" style="flex:1"><div class="kpi-label">Filtered Amount</div><div class="kpi-value" style="color:#8b5cf6">${fmtS(totalAmt)}</div></div>
</div>
<div class="toolbar" style="margin-bottom:0;border-radius:12px 12px 0 0">
  <span class="toolbar-title">🛡️ BG Report</span>
  <input type="text" placeholder="🔍 Search..." value="${bgSearch}" oninput="bgSearch=this.value;render()" class="search-input">
  <select onchange="bgFilterProject=this.value;render()" class="sel"><option value="">All Projects</option>${projects.map(p=>`<option value="${p}" ${bgFilterProject===p?'selected':''}>${p}</option>`).join('')}</select>
  <select onchange="bgFilterStatus=this.value;render()" class="sel">
    <option value="">All Status</option><option value="Active">Active</option><option value="Released">Released</option><option value="Expired">Expired</option>
  </select>
  ${types.length?`<select onchange="bgFilterType=this.value;render()" class="sel"><option value="">All Types</option>${types.map(t=>`<option value="${t}" ${bgFilterType===t?'selected':''}>${t}</option>`).join('')}</select>`:''}
  ${bgSearch||bgFilterProject||bgFilterStatus||bgFilterType?`<button onclick="bgSearch='';bgFilterProject='';bgFilterStatus='';bgFilterType='';render()" class="btn btn-ghost btn-sm">✕ Clear</button>`:''}
  <button onclick="openBGModal(null)" class="btn btn-primary btn-sm" style="margin-left:auto">+ Add BG</button>
  <button onclick="exportBGCSV()" class="btn btn-ghost btn-sm">📥 Export</button>
</div>
<div class="table-wrap" style="border-radius:0 0 12px 12px;border-top:none">
<table>
<thead><tr>
  <th ${thS('sno')}>S.No${bgSort.col==='sno'?bgSort.dir>0?' ▲':' ▼':''}</th>
  <th ${thS('project')}>Project${bgSort.col==='project'?bgSort.dir>0?' ▲':' ▼':''}</th>
  <th ${thS('bgNo')}>BG No.</th>
  <th ${thS('bank')}>Bank</th>
  <th ${thS('bgType')}>Type</th>
  <th class="r" ${thS('amount')}>Amount${bgSort.col==='amount'?bgSort.dir>0?' ▲':' ▼':''}</th>
  <th ${thS('issueDate')}>Issue Date${bgSort.col==='issueDate'?bgSort.dir>0?' ▲':' ▼':''}</th>
  <th ${thS('expiryDate')}>Expiry Date${bgSort.col==='expiryDate'?bgSort.dir>0?' ▲':' ▼':''}</th>
  <th ${thS('status')}>Status</th>
  <th>Remarks</th>
  <th style="text-align:center">Actions</th>
</tr></thead>
<tbody>
${rows.length===0?`<tr><td colspan="11" class="empty">No BG records. Click "+ Add BG" or import from CSV.</td></tr>`:''}
${rows.map(r=>{
  const exp=r.expiryDate;
  let expCls='';
  if(exp){
    const parts=exp.split('/');
    const d=parts.length===3?new Date(parts[2],parts[1]-1,parts[0]):new Date(exp);
    const diff=Math.round((d-new Date())/(1000*86400));
    if(diff<0)expCls='color:#b91c1c;font-weight:700';
    else if(diff<30)expCls='color:#f59e0b;font-weight:700';
  }
  return`<tr>
  <td style="color:var(--muted)">${r.sno}</td>
  <td style="font-weight:600;max-width:160px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.project}">${r.project||'—'}</div></td>
  <td style="font-weight:600">${r.bgNo||'—'}</td>
  <td>${r.bank||'—'}</td>
  <td>${r.bgType?`<span class="badge badge-teal">${r.bgType}</span>`:'—'}</td>
  <td class="r mono" style="color:#3b82f6;font-weight:700">${fmt(r.amount)}</td>
  <td>${r.issueDate||'—'}</td>
  <td style="${expCls}">${r.expiryDate||'—'}</td>
  <td><span class="badge ${r.status==='Active'?'badge-green':r.status==='Released'?'badge-blue':'badge-red'}">${r.status||'Active'}</span></td>
  <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${r.remarks||'—'}</td>
  <td style="text-align:center;display:flex;gap:4px;justify-content:center">
    <button onclick="openBGModal('${r.id}')" class="btn btn-blue btn-sm">✏️</button>
    <button onclick="deleteBG('${r.id}')" class="btn btn-red btn-sm">🗑️</button>
  </td>
</tr>`;}).join('')}
</tbody>
<tfoot><tr>
  <td colspan="5">Total (${rows.length})</td>
  <td class="r mono" style="color:#3b82f6">${fmt(totalAmt)}</td>
  <td colspan="5"></td><td></td>
</tr></tfoot>
</table></div>`;
}

window.openFollowUp=(id,type)=>{modal={type:'followup_'+type,siteId:id};render()};
window.editSite=(id)=>{
  const s=st.sites.find(x=>x.id===id);if(!s)return;
  const p=prompt('Pending Bill:',s.pending);if(p!==null)s.pending=parseFloat(p)||0;
  const sd=prompt('SD Deduction:',s.sd);if(sd!==null)s.sd=parseFloat(sd)||0;
  const ld=prompt('LD Deduction:',s.ld);if(ld!==null)s.ld=parseFloat(ld)||0;
  const w=prompt('Withheld:',s.witheld);if(w!==null)s.witheld=parseFloat(w)||0;
  const t=prompt('Total Outstanding:',s.total);if(t!==null)s.total=parseFloat(t)||0;
  save();render();
};
window.addInvoice=(sid)=>{
  const s=st.sites.find(x=>x.id===sid);if(!s)return;
  const no=prompt('Invoice Number:');if(!no)return;
  const date=prompt('Date (DD/MM/YYYY):');
  const amount=parseFloat(prompt('Amount:'))||0;
  const desc=prompt('Description:');
  const status=prompt('Status (Pending/Paid/Partial):','Pending');
  s.invoices.push({id:uid(),no,date:date||'',amount,desc:desc||'',status:status||'Pending'});
  save();render();
};
window.editInvoice=(sid,iid)=>{
  const s=st.sites.find(x=>x.id===sid);const inv=s?.invoices.find(i=>i.id===iid);if(!inv)return;
  const no=prompt('Invoice No:',inv.no);if(no!==null)inv.no=no;
  const date=prompt('Date:',inv.date);if(date!==null)inv.date=date;
  const amount=prompt('Amount:',inv.amount);if(amount!==null)inv.amount=parseFloat(amount)||0;
  const desc=prompt('Description:',inv.desc);if(desc!==null)inv.desc=desc;
  const status=prompt('Status:',inv.status);if(status!==null)inv.status=status;
  save();render();
};
window.deleteInvoice=(sid,iid)=>{
  if(!confirm('Delete invoice?'))return;
  const s=st.sites.find(x=>x.id===sid);
  if(s){s.invoices=s.invoices.filter(i=>i.id!==iid);save();render()}
};

window.importJSON=()=>{
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{st=JSON.parse(ev.target.result);save();render();alert('Imported!')}catch{alert('Invalid file')}};r.readAsText(e.target.files[0])};i.click();
};
window.resetAll=()=>{
  if(!confirm('Reset ALL data? Cannot be undone.'))return;
  st={sites:JSON.parse(JSON.stringify(defaultSites)),pantryId:st.pantryId||'',deposits:[],bgReports:[]};
  save();render();
};
async function syncPantry(){
  if(!st.pantryId)return;
  try{await fetch(`https://getpantry.cloud/apiv1/pantry/${st.pantryId}/basket/ve_main`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(st)})}catch(e){}
}
function dl(content,filename,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();
}

// ============================================================
// EXPOSE FOR HTML EVENTS
// ============================================================
window.setSDB=setSDB;window.setLDB=setLDB;window.setPB=setPB;
window.loadCSV=loadCSV;

// ============================================================
// BOOT
// ============================================================
render();
// Auto-load CSV if no data yet
if(!st.deposits.length&&!st.bgReports.length){
  loadCSV();
}
</script>
</body>
</html>
