<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--sidebar:#0f172a;--sidebar-text:#94a3b8;--sidebar-active:#3b82f6;
  --card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--orange:#f97316;
  --green:#22c55e;--blue:#3b82f6;--teal:#14b8a6;
  --badge-180:rgba(239,68,68,.12);--badge-90:rgba(245,158,11,.12);--badge-60:rgba(139,92,246,.12);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;z-index:50}
.sidebar-logo{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo .brand{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sidebar-logo .sub{font-size:10px;color:var(--sidebar-text);margin-top:2px}
.sidebar-logo .icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}
nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--sidebar-text);font-size:12.5px;font-weight:500;transition:.15s;width:100%;background:none;border:none;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(59,130,246,.18);color:#93c5fd}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.06)}
.sheet-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:rgba(34,197,94,.12);color:#4ade80;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;transition:.15s}
.sheet-btn:hover{background:rgba(34,197,94,.2)}

/* MAIN */
.main{flex:1;margin-left:220px;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:40}
.topbar-title{font-size:14px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center}
.content{padding:20px;flex:1}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kpi-label{font-size:10.5px;color:var(--muted);font-weight:500;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:800;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.kpi-blue{color:var(--blue)}.kpi-amber{color:var(--amber)}.kpi-red{color:var(--red)}.kpi-purple{color:var(--purple)}.kpi-orange{color:var(--orange)}.kpi-green{color:var(--green)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--border);padding:4px;border-radius:10px;width:fit-content}
.tab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:.15s}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.table-title{font-size:13px;font-weight:700}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;width:200px}
.search-input:focus{border-color:var(--blue)}
.pm-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--card)}
table{width:100%;border-collapse:collapse}
thead{background:#f8fafc}
th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.tr-expanded td{background:#eff6ff}
tfoot td{background:#f0f9ff;font-weight:700;font-size:12px;border-top:2px solid #bfdbfe}

.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.badge-pm{display:inline-block;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#2563eb;font-size:10.5px;font-weight:600}
.expand-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.expand-btn.open{background:var(--blue);color:#fff}
.expand-btn.closed{background:#eff6ff;color:var(--blue)}

/* EXPANDED DETAIL */
.detail-row td{padding:0;background:linear-gradient(180deg,#f0f9ff,#e0f2fe)}
.detail-wrap{padding:16px}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.detail-name{font-weight:700;font-size:13px}
.detail-meta{font-size:11px;color:var(--muted);margin-top:2px}
.detail-actions{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-green{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}.btn-green:hover{background:#dcfce7}
.btn-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}.btn-blue:hover{background:#dbeafe}
.btn-amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}.btn-amber:hover{background:#fef3c7}
.btn-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}.btn-red:hover{background:#fee2e2}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{opacity:.9}
.btn-wa{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.btn-wa:hover{background:#bbf7d0}

.amount-cards{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:14px}
.amt-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.amt-card.highlight{background:var(--blue);border-color:var(--blue)}
.amt-card .lbl{font-size:9.5px;color:var(--muted);font-weight:500;margin-bottom:3px}
.amt-card.highlight .lbl{color:rgba(255,255,255,.7)}
.amt-card .val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.amt-card.highlight .val{color:#fff}

/* AGING BADGE */
.age-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px}
.age-180{background:var(--badge-180);color:#b91c1c}
.age-90{background:var(--badge-90);color:#92400e}
.age-60{background:var(--badge-60);color:#6d28d9}
.age-30{background:rgba(34,197,94,.12);color:#15803d}

/* AGING TABLE in tabs */
.aging-section{padding:0}
.aging-filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}

/* INVOICES */
.inv-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.inv-header{padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.inv-title{font-size:12px;font-weight:700}
.inv-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:14px;padding:24px;width:480px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:inherit;outline:none}
.form-input:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* FOLLOW-UP MODAL */
.followup-modal{width:560px}
.email-preview{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:10px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:inherit;max-height:200px;overflow-y:auto}

/* DASHBOARD CARDS */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.dash-card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pm-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.15s}
.pm-row:hover{background:#f8fafc}
.pm-avatar{width:32px;height:32px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;transition:.15s}
.top-row:hover{background:#f8fafc}
.rank-badge{width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-1{background:#fef2f2;color:#b91c1c}.rank-2{background:#fff7ed;color:#c2410c}.rank-3{background:#fefce8;color:#854d0e}.rank-n{background:#f1f5f9;color:#475569}

/* SETTINGS */

.settings-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.settings-title{font-size:13px;font-weight:700;margin-bottom:14px}
.stat-num{font-size:24px;font-weight:800}

/* EXPORT btn */
.export-btn{padding:6px 14px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);font-family:inherit;transition:.15s}
.export-btn:hover{background:#f8fafc}
.clear-btn{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);font-family:inherit;color:var(--muted)}

/* SD / LD sub-tables */
.sub-table-title{font-size:12px;font-weight:700;padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.bucket-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:6px}
.bucket-fill{height:100%;border-radius:3px;background:var(--blue)}
</style>
</head>

// Helpers
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS=n=>{n=Number(n||0);if(n>=1e7)return'₹'+(n/1e7).toFixed(2)+'Cr';if(n>=1e5)return'₹'+(n/1e5).toFixed(2)+'L';return'₹'+n.toLocaleString('en-IN',{maximumFractionDigits:0})};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2);
const save=()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(st));if(st.pantryId)syncPantry()};
const gid=id=>GID_MAP[id]||'';
const sheetUrl=id=>gid(id)?SB+gid(id):'';
const pms=()=>[...new Set(st.sites.map(s=>s.pm))].sort();
const sumAll=k=>st.sites.reduce((a,s)=>a+(s[k]||0),0);
const ageBucketClass=b=>b==='180+ Days'?'age-180':b==='91-180 Days'?'age-90':b==='61-90 Days'?'age-60':'age-30';

// Pantry
async function syncPantry(){
  if(!st.pantryId)return;
  try{await fetch(`https://getpantry.cloud/apiv1/pantry/${st.pantryId}/basket/vishal_electricals`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sites:st.sites,updated:new Date().toISOString()})})}catch(e){}
}
async function loadPantry(){
  if(!st.pantryId)return alert('Enter Pantry ID first');
  try{const r=await fetch(`https://getpantry.cloud/apiv1/pantry/${st.pantryId}/basket/vishal_electricals`);if(r.ok){const d=await r.json();if(d.sites){st.sites=d.sites;save();render();alert('Data loaded!')}}}catch(e){alert('Failed: '+e.message)}
}

  document.getElementById('app').innerHTML=`
<div class="app">
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">⚡</div>
    <div class="brand">Vishal Electricals</div>
    <div class="sub">Payment Dashboard</div>
  </div>

</aside>
<div class="main">

</div>
</div>
${modal?renderModal():''}`;

// ===== DASHBOARD =====
function renderDash(){
  const t={pending:sumAll('pending'),sd:sumAll('sd'),ld:sumAll('ld'),witheld:sumAll('witheld'),other:sumAll('other'),total:sumAll('total')};
  const active=st.sites.filter(s=>s.total>0).length;
  const top=[...st.sites].sort((a,b)=>b.total-a.total).slice(0,5);
  const pmData=pms().map(p=>({n:p,c:st.sites.filter(s=>s.pm===p).length,t:st.sites.filter(s=>s.pm===p).reduce((a,s)=>a+s.total,0)})).sort((a,b)=>b.t-a.t);
  const buckets={'180+ Days':0,'91-180 Days':0,'61-90 Days':0,'0-60 Days':0};
  AGING_DATA.forEach(r=>{buckets[r.bucket]=(buckets[r.bucket]||0)+r.amount});

  return`
<div class="kpi-grid">
  ${[
    {l:'Total Outstanding',v:t.total,c:'kpi-blue'},
    {l:'Pending Bills',v:t.pending,c:'kpi-amber'},
    {l:'SD Deduction',v:t.sd,c:'kpi-red'},
    {l:'LD Deduction',v:t.ld,c:'kpi-purple'},
    {l:'Withheld',v:t.witheld,c:'kpi-orange'},
    {l:'Active Sites',v:active,c:'kpi-green',n:true},
  ].map(c=>`
  <div class="kpi" onclick="page='summary';render()">
    <div class="kpi-label">${c.l}</div>
    <div class="kpi-value ${c.c}">${c.n?c.v:fmtS(c.v)}</div>
  </div>`).join('')}
</div>

<div class="dash-grid" style="margin-bottom:16px">
  <div class="dash-card">
    <div class="dash-card-title">👥 Manager Breakdown</div>
    ${pmData.map(m=>`
    <div class="pm-row" onclick="filterPM='${m.n}';page='summary';render()">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pm-avatar">${m.n[0]}</div>
        <div><div style="font-size:12.5px;font-weight:600">${m.n}</div><div style="font-size:10.5px;color:var(--muted)">${m.c} sites</div></div>
      </div>
      <span style="font-size:13px;font-weight:700">${fmtS(m.t)}</span>
    </div>`).join('')}
  </div>
  <div class="dash-card">
    <div class="dash-card-title">🔝 Top Outstanding Sites</div>
    ${top.map((s,i)=>`
    <div class="top-row" onclick="page='summary';expandedId=${s.id};render()">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="rank-badge ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</span>
        <span style="font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
      </div>
      <span style="font-size:12.5px;font-weight:700">${fmtS(s.total)}</span>
    </div>`).join('')}

    <div><div class="stat-num" style="color:var(--green)">${st.sites.reduce((a,s)=>a+s.invoices.length,0)}</div><div style="font-size:11px;color:var(--muted)">Total Invoices</div></div>
    <div><div class="stat-num" style="color:var(--purple)">${fmtS(sumAll('total'))}</div><div style="font-size:11px;color:var(--muted)">Total Outstanding</div></div>
  </div>
</div>
</div>`;
}

// ===== MODAL =====
function renderModal(){
  if(!modal)return'';
  if(modal.type==='followup_email'){
    const s=st.sites.find(x=>x.id===modal.siteId);
    if(!s)return'';
    const aging=AGING_DATA.filter(r=>r.sno===s.sno);
    const sdAmt=aging.filter(r=>r.col==='SD Deduction Amount').reduce((a,r)=>a+r.amount,0);
    const ldAmt=aging.filter(r=>r.col==='LD Deduction Amount').reduce((a,r)=>a+r.amount,0);
    const pendAmt=aging.filter(r=>r.col==='Pending Bill Amount').reduce((a,r)=>a+r.amount,0);
    const maxAge=aging.length>0?Math.max(...aging.map(r=>r.ageDays)):0;
    const body=`Subject: Payment Follow-Up – ${s.name}

Dear Sir/Madam,

Greetings from Vishal Electricals!

This is a follow-up regarding the outstanding dues against the above project. We request your kind attention to the following pending amounts:

${pendAmt>0?`  • Pending Bills:     ${fmt(pendAmt)}\n`:''}${sdAmt>0?`  • SD Deduction:     ${fmt(sdAmt)}\n`:''}${ldAmt>0?`  • LD Deduction:     ${fmt(ldAmt)}\n`:''}${s.witheld>0?`  • Withheld Amount:  ${fmt(s.witheld)}\n`:''}
  Total Outstanding:   ${fmt(s.total)}
  Oldest Invoice Age:  ${maxAge} Days

We request you to kindly process the above payment at the earliest or advise on the expected release date.

Please feel free to contact us for any clarification.

Thanking you,
Vishal Electricals – Finance Team`;

    const mailto=`mailto:?subject=${encodeURIComponent('Payment Follow-Up – '+s.name)}&body=${encodeURIComponent(body.replace(/Subject:[^\n]+\n\n/,''))}`;
    return`<div class="modal-backdrop" onclick="if(event.target===this){modal=null;render()}">
<div class="modal followup-modal">
  <div class="modal-title">✉️ Email Follow-up – ${s.name.split(' - ').pop()}</div>
  <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px">Preview the draft email below. Click "Open in Mail" to send.</div>
  <div class="email-preview">${body.replace(/</g,'&lt;')}</div>
  <div class="modal-footer">
    <button onclick="modal=null;render()" class="btn" style="border:1px solid var(--border)">Close</button>
    <button onclick="navigator.clipboard.writeText(${JSON.stringify(body)}).then(()=>alert('Copied!'))" class="btn btn-blue">📋 Copy</button>
    <a href="${mailto}" class="btn btn-primary" style="text-decoration:none">📧 Open in Mail</a>
  </div>
</div>
</div>`;
  }
  if(modal.type==='followup_wa'){
    const s=st.sites.find(x=>x.id===modal.siteId);
    if(!s)return'';
    const aging=AGING_DATA.filter(r=>r.sno===s.sno);
    const maxAge=aging.length>0?Math.max(...aging.map(r=>r.ageDays)):0;
    const msg=`*Payment Follow-Up – Vishal Electricals*\n\nDear Sir/Madam,\n\nFollowing up on outstanding dues for:\n*${s.name}*\n\n💰 *Total Outstanding:* ${fmt(s.total)}\n${s.pending>0?`📄 Pending Bills: ${fmt(s.pending)}\n`:''}${s.sd>0?`🔒 SD Deduction: ${fmt(s.sd)}\n`:''}${s.ld>0?`⏳ LD Deduction: ${fmt(s.ld)}\n`:''}${s.witheld>0?`⚠️ Withheld: ${fmt(s.witheld)}\n`:''}\n⏱️ Oldest Invoice Age: *${maxAge} days*\n\nKindly process the payment or advise expected date.\n\nThank you! 🙏`;
    const waUrl=`https://wa.me/?text=${encodeURIComponent(msg)}`;
    return`<div class="modal-backdrop" onclick="if(event.target===this){modal=null;render()}">
<div class="modal followup-modal">
  <div class="modal-title">💬 WhatsApp Follow-up – ${s.name.split(' - ').pop()}</div>
  <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px">Message draft below. Click "Open WhatsApp" to share.</div>
  <div class="email-preview">${msg.replace(/</g,'&lt;').replace(/\*([^*]+)\*/g,'<strong>$1</strong>')}</div>
  <div class="modal-footer">
    <button onclick="modal=null;render()" class="btn" style="border:1px solid var(--border)">Close</button>
    <button onclick="navigator.clipboard.writeText(${JSON.stringify(msg)}).then(()=>alert('Copied!'))" class="btn btn-blue">📋 Copy</button>
    <a href="${waUrl}" target="_blank" class="btn btn-wa" style="text-decoration:none">💬 Open WhatsApp</a>
  </div>
</div>
</div>`;
  }
  return'';
}

// ===== ACTIONS =====
window.openFollowUp=(id,type)=>{modal={type:'followup_'+type,siteId:id};render()};

window.editSite=(id)=>{
  const s=st.sites.find(x=>x.id===id);if(!s)return;
  const p=prompt('Pending Bill:',s.pending);if(p!==null)s.pending=parseFloat(p)||0;
  const sd=prompt('SD Deduction:',s.sd);if(sd!==null)s.sd=parseFloat(sd)||0;
  const ld=prompt('LD Deduction:',s.ld);if(ld!==null)s.ld=parseFloat(ld)||0;
  const w=prompt('Withheld:',s.witheld);if(w!==null)s.witheld=parseFloat(w)||0;
  const t=prompt('Total Outstanding:',s.total);if(t!==null)s.total=parseFloat(t)||0;
  save();render();
};
window.addInvoice=(sid)=>{
  const s=st.sites.find(x=>x.id===sid);if(!s)return;
  const no=prompt('Invoice Number:');if(!no)return;
  const date=prompt('Date (DD/MM/YYYY):');
  const amount=parseFloat(prompt('Amount:'))||0;
  const desc=prompt('Description (optional):');
  const status=prompt('Status (Pending/Paid/Partial):','Pending');
  s.invoices.push({id:uid(),no,date:date||'',amount,desc:desc||'',status:status||'Pending'});
  save();render();
};
window.editInvoice=(sid,iid)=>{
  const s=st.sites.find(x=>x.id===sid);const inv=s?.invoices.find(i=>i.id===iid);if(!inv)return;
  const no=prompt('Invoice No:',inv.no);if(no!==null)inv.no=no;
  const date=prompt('Date:',inv.date);if(date!==null)inv.date=date;
  const amount=prompt('Amount:',inv.amount);if(amount!==null)inv.amount=parseFloat(amount)||0;
  const desc=prompt('Description:',inv.desc);if(desc!==null)inv.desc=desc;
  const status=prompt('Status (Pending/Paid/Partial):',inv.status);if(status!==null)inv.status=status;
  save();render();
};
window.deleteInvoice=(sid,iid)=>{
  if(!confirm('Delete this invoice?'))return;
  const s=st.sites.find(x=>x.id===sid);
  if(s){s.invoices=s.invoices.filter(i=>i.id!==iid);save();render()}
};
window.exportCSV=()=>{
  const h='S.No,Project,PM,Pending,SD,LD,Withheld,Other,Total,Invoices';
  const r=st.sites.map(s=>[s.sno,`"${s.name}"`,s.pm,s.pending,s.sd,s.ld,s.witheld,s.other,s.total,s.invoices.length].join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([[h,...r].join('\n')],{type:'text/csv'}));
  a.download='vishal_electricals.csv';a.click();
};
window.exportJSON=()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(st,null,2)],{type:'application/json'}));
  a.download='ve_backup.json';a.click();
};
window.importJSON=()=>{
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{st=JSON.parse(ev.target.result);save();render();alert('Imported!')}catch{alert('Invalid file')}};r.readAsText(e.target.files[0])};i.click();
};
window.resetAll=()=>{
  if(confirm('Reset ALL data to defaults? This cannot be undone.')){
    st={sites:JSON.parse(JSON.stringify(defaultSites)),pantryId:st.pantryId,googleApiKey:st.googleApiKey};
    save();render();
  }
};

render();
</script>
</body>
</html>
