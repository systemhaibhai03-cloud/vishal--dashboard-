// ── LIVE AGING ────────────────────────────────────────────────
function parseInvDate(s){
  if(!s)return null;
  var p=String(s).trim().match(/^(\d{2})[\/\.](\d{2})[\/\.](\d{4})$/);
  if(p)return new Date(+p[3],+p[2]-1,+p[1]);
  return null;
}
function ageDays(dt){
  var d=parseInvDate(dt);
  if(!d)return 0;
  var now=new Date();now.setHours(0,0,0,0);
  return Math.round((now-d)/86400000);
}
function ageBkt(days){
  if(days>180)return "180+ Days";
  if(days>90)return "91-180 Days";
  if(days>60)return "61-90 Days";
  return "0-60 Days";
}
function bgDaysLeft(s){
  if(!s)return null;
  var m=String(s).match(/(\d{2})\.(\d{2})\.(\d{4})/);
  if(!m)return null;
  var d=new Date(+m[3],+m[2]-1,+m[1]);
  var now=new Date();now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

  if(s.witheld>0)lines.push("  Withheld       : "+f2(s.witheld).replace(/&#8377;/g,"Rs."));

}

    h+="<td>"+(site?"<span class=\"badge\" style=\"background:#eff6ff;color:#2563eb\">"+site.pm+"</span>":"")+"</td>";
    h+="<td>"+r.dt+"</td>";

// ── BG ALERT ──────────────────────────────────────────────────
function renderBGAlert(){
  var old=document.getElementById("bgfabwrap");
  if(old)old.remove();
  var alerts=[];
  st.bgReports.forEach(function(b){
    var dl=bgDaysLeft(b.expiryDate);
    if(dl!==null&&dl<=30)alerts.push({b:b,dl:dl});
  });
  if(!alerts.length)return;
  alerts.sort(function(a,b){return a.dl-b.dl;});
  var expired=alerts.filter(function(x){return x.dl<0;});
  var fabBg=expired.length?"#ef4444":"#f59e0b";
  var items="";
  alerts.forEach(function(x){
    var b=x.b,dl=x.dl,cBg,cClr,cTxt;
    if(dl<0){cBg="#fef2f2";cClr="#b91c1c";cTxt="Expired "+Math.abs(dl)+"d ago";}
    else if(dl===0){cBg="#fef2f2";cClr="#ef4444";cTxt="TODAY!";}
    else if(dl<=4){cBg="#fef2f2";cClr="#ef4444";cTxt="In "+dl+"d - URGENT";}
    else{cBg="#fffbeb";cClr="#92400e";cTxt="In "+dl+"d";}
    items+="<div style=\"padding:11px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer\" onmouseenter=\"this.style.background='#fef2f2'\" onmouseleave=\"this.style.background=''\" onclick=\"goPage('bg')\">";
    items+="<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:3px\">";
    items+="<span style=\"font-weight:700;font-size:12px;max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+b.authority+"</span>";
    items+="<span style=\"padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:"+cBg+";color:"+cClr+"\">"+cTxt+"</span></div>";
    items+="<div style=\"font-size:11px;color:#64748b\">BG: "+b.bgNo+" &nbsp;|&nbsp; "+f2(b.amt)+"</div>";
    items+="<div style=\"font-size:10.5px;color:#94a3b8;margin-top:1px\">Expiry: "+b.expiryDate+"</div></div>";
  });
  var popupStyle="position:absolute;bottom:64px;right:0;width:380px;max-width:90vw;max-height:55vh;overflow-y:auto;background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);display:"+(bgAlertOpen?"block":"none");
  var popup="<div id=\"bgpopup\" style=\""+popupStyle+"\">";
  popup+="<div style=\"padding:13px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff\">";
  popup+="<span style=\"font-size:13px;font-weight:700;color:#ef4444\">&#128680; BG Expiry Alerts ("+alerts.length+")</span>";
  popup+="<button onclick=\"closeBGAlert()\" style=\"background:none;border:none;cursor:pointer;font-size:18px;color:#64748b\">&#215;</button></div>";
  popup+=items+"</div>";
  var fabStyle="width:52px;height:52px;border-radius:50%;background:"+fabBg+";color:#fff;border:none;cursor:pointer;font-size:20px;box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;position:relative"+(expired.length?";animation:pulse 2s infinite":"");
  var fab="<button onclick=\"toggleBGAlert()\" title=\""+alerts.length+" BG Alert(s)\" style=\""+fabStyle+"\">";
  fab+="&#128737;<span style=\"position:absolute;top:-3px;right:-3px;background:#fff;color:"+fabBg+";border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid "+fabBg+"\">"+alerts.length+"</span></button>";
  var wrap=document.createElement("div");
  wrap.id="bgfabwrap";
  wrap.style.cssText="position:fixed;bottom:20px;right:20px;z-index:1000";
  wrap.innerHTML=popup+fab;
  document.body.appendChild(wrap);
}

window.edInv=function(sid,iid){
  var s=st.sites.find(function(x){return x.id===sid;});
  var inv=s&&s.invoices.find(function(i){return i.id===iid;});if(!inv)return;
  var no=prompt("Invoice No:",inv.no);if(no!==null)inv.no=no;
  var date=prompt("Date:",inv.date);if(date!==null)inv.date=date;
  var amt=prompt("Amount:",inv.amount);if(amt!==null)inv.amount=parseFloat(amt)||0;
  var desc=prompt("Description:",inv.desc);if(desc!==null)inv.desc=desc;
  var s2=prompt("Status:",inv.status);if(s2!==null)inv.status=s2;
  save();render();
};
window.delInv=function(sid,iid){if(!confirm("Delete invoice?"))return;var s=st.sites.find(function(x){return x.id===sid;});if(s){s.invoices=s.invoices.filter(function(i){return i.id!==iid;});save();render();}};
window.openBillM=function(sid,bid){modal={type:"bill",sid:sid,bid:bid};render();};
window.saveBill=function(sid,bid){
  var s=st.sites.find(function(x){return x.id===sid;});if(!s)return;
  function gv(id,n){var el=document.getElementById(id);return n?parseFloat(el?el.value:"0")||0:el?el.value:"";}
  var b={id:bid||uid(),invNo:gv("bi_no"),invDate:gv("bi_dt"),taxable:gv("bi_tax",true),gst:gv("bi_gst",true),total:gv("bi_tax",true)+gv("bi_gst",true),payDate:gv("bi_pdt"),payAmt:gv("bi_pay",true),gstTDS:gv("bi_gtds",true),incomeTDS:gv("bi_itds",true),labCess:0,ld:gv("bi_ld",true),sdDeduct:gv("bi_sd",true),autoDDRecovery:gv("bi_auto",true),shortPay:gv("bi_sp",true)};
  if(bid){var i=s.bills.findIndex(function(x){return x.id===bid;});if(i>=0)s.bills[i]=b;}else s.bills.push(b);
  modal=null;save();render();
};
window.delBill=function(sid,bid){if(!confirm("Delete bill?"))return;var s=st.sites.find(function(x){return x.id===sid;});if(s){s.bills=s.bills.filter(function(x){return x.id!==bid;});save();render();}};
window.openDepM=function(rid){modal={type:"dep",rid:rid||null};render();};
window.saveDep=function(rid){
  function gv(id){var el=document.getElementById(id);return el?el.value:"";}
  var existing=rid?st.deposits.find(function(x){return x.id===rid;}):null;
  var d={id:rid||uid(),sno:existing?existing.sno:st.deposits.length+1,dated:gv("d_dt"),nature:gv("d_nat"),authority:gv("d_auth"),work:gv("d_work"),amt:parseFloat(gv("d_amt"))||0,bank:gv("d_bank"),instrument:gv("d_inst"),period:gv("d_per"),status:gv("d_st"),due:gv("d_due")};
  if(rid){var i=st.deposits.findIndex(function(x){return x.id===rid;});if(i>=0)st.deposits[i]=d;}else st.deposits.push(d);
  modal=null;save();render();
};
window.delDep=function(rid){if(!confirm("Delete deposit?"))return;st.deposits=st.deposits.filter(function(x){return x.id!==rid;});save();render();};
window.openBGM=function(rid){modal={type:"bg",rid:rid||null};render();};
window.saveBG=function(rid){
  function gv(id){var el=document.getElementById(id);return el?el.value:"";}
  var existing=rid?st.bgReports.find(function(x){return x.id===rid;}):null;
  var d={id:rid||uid(),sno:existing?existing.sno:st.bgReports.length+1,section:gv("b_sec"),authority:gv("b_auth"),work:gv("b_work"),bgNo:gv("b_no"),bgPct:gv("b_pct"),issueDate:gv("b_iss"),expiryDate:gv("b_exp"),claimPeriod:gv("b_clm"),dlp:gv("b_dlp"),amt:parseFloat(gv("b_amt"))||0,status:gv("b_st")};
  if(rid){var i=st.bgReports.findIndex(function(x){return x.id===rid;});if(i>=0)st.bgReports[i]=d;}else st.bgReports.push(d);
  modal=null;save();render();
};
window.delBG=function(rid){if(!confirm("Delete BG?"))return;st.bgReports=st.bgReports.filter(function(x){return x.id!==rid;});save();render();};

function dl(c,fn,t){var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=fn;a.click();}
window.expPayCSV=function(){
  var h="S.No,Project,PM,Pending,SD,LD,Withheld,Total";
  var r=st.sites.map(function(s){return [s.sno,'"'+s.name+'"',s.pm,s.pending,s.sd,s.ld,s.witheld,s.total].join(",");});
  dl([h].concat(r).join("\n"),"ve_payment.csv","text/csv");
};
window.expDepCSV=function(){
  var h="S.No,Date,Authority,Nature,Amount,Instrument,Bank,Period,Status,Due";
  var r=st.deposits.map(function(d){return [d.sno,d.dated,'"'+d.authority+'"',d.nature,d.amt,'"'+(d.instrument||"")+'"',d.bank,d.period,d.status,d.due].join(",");});
  dl([h].concat(r).join("\n"),"ve_deposits.csv","text/csv");
};
window.expBGCSV=function(){
  var h="S.No,Section,Authority,BG No,BG%,Issue Date,Expiry Date,Claim Period,DLP,Amount,Status";
  var r=st.bgReports.map(function(b){return [b.sno,b.section,'"'+b.authority+'"',b.bgNo,b.bgPct,b.issueDate,'"'+(b.expiryDate||"")+'"',b.claimPeriod,b.dlp,b.amt,b.status].join(",");});
  dl([h].concat(r).join("\n"),"ve_bg.csv","text/csv");
};
window.expJSON=function(){dl(JSON.stringify(st,null,2),"ve_backup.json","application/json");};
window.impJSON=function(){
  var i=document.createElement("input");i.type="file";i.accept=".json";
  i.onchange=function(e){
    var r=new FileReader();
    r.onload=function(ev){try{st=JSON.parse(ev.target.result);save();render();alert("Imported!");}catch(e){alert("Invalid JSON");}};
    r.readAsText(e.target.files[0]);
  };i.click();
};
window.resetAll=function(){
  if(!confirm("Reset ALL data?"))return;
  st={sites:JSON.parse(JSON.stringify(DS)),deposits:REAL_DEP,bgReports:REAL_BG,pantryId:""};
  save();render();
};

render();
